substitutions:
  _REGION: us-central1

  _WEB_SERVICE: aridinsights-web
  _WEB_REPO: web
  _WEB_IMAGE: aridinsights-web

  _ENGINE_SERVICE: arid-compliance-engine
  _ENGINE_REPO: agents
  _ENGINE_IMAGE: compliance-engine

steps:
  # -------------------------
  # WEB: Build + Push
  # -------------------------
  - name: gcr.io/cloud-builders/docker
    id: web-build
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_WEB_REPO}/${_WEB_IMAGE}:${TAG_NAME}",
        "-f",
        "apps/web-main/Dockerfile",
        "apps/web-main",
      ]

  - name: gcr.io/cloud-builders/docker
    id: web-push
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_WEB_REPO}/${_WEB_IMAGE}:${TAG_NAME}",
      ]

  # WEB: Deploy
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: web-deploy
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "${_WEB_SERVICE}",
        "--image",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_WEB_REPO}/${_WEB_IMAGE}:${TAG_NAME}",
        "--region",
        "${_REGION}",
        "--platform",
        "managed",
        "--quiet",
        "--labels",
        "release_tag=${TAG_NAME},git_sha=${COMMIT_SHA},build_id=${BUILD_ID}",
      ]

  # -------------------------
  # ENGINE: Build + Push
  # -------------------------
  - name: gcr.io/cloud-builders/docker
    id: engine-build
    dir: agents/compliance-engine
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ENGINE_REPO}/${_ENGINE_IMAGE}:${TAG_NAME}",
        ".",
      ]

  - name: gcr.io/cloud-builders/docker
    id: engine-push
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ENGINE_REPO}/${_ENGINE_IMAGE}:${TAG_NAME}",
      ]

  # ENGINE: Deploy
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: engine-deploy
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "${_ENGINE_SERVICE}",
        "--image",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ENGINE_REPO}/${_ENGINE_IMAGE}:${TAG_NAME}",
        "--region",
        "${_REGION}",
        "--platform",
        "managed",
        "--quiet",
        "--labels",
        "release_tag=${TAG_NAME},git_sha=${COMMIT_SHA},build_id=${BUILD_ID}",
      ]

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_WEB_REPO}/${_WEB_IMAGE}:${TAG_NAME}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ENGINE_REPO}/${_ENGINE_IMAGE}:${TAG_NAME}"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
