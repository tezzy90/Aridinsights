id: "debug.cloud_run.audit_label_error"
version: "1.0.0"
owner: "platform-engineering"
category: "debug"
intent: "Identify why a Cloud Run deployment failed due to label formatting"
inputs:
  - name: "LOG_TEXT"
    type: "string"
    required: true
outputs:
  - name: "root_cause"
    type: "string"
steps:
  - "Search log for 'violates format constraints'"
  - "Check for dots (.), uppercase chars, or spaces in label values"
  - "Verify against regex: ^[a-z0-9_-]{1,63}$"
success_criteria:
  - "Identifies the invalid character"
examples:
  - input: |
      Label value 'v0.2.0' violates format constraints.
    output: |
      Root Cause: Dots (.) are not allowed in label values.
