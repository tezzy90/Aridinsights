id: "deploy.cloud_run.deploy_image_by_digest"
version: "1.0.0"
owner: "platform-engineering"
category: "deploy"
intent: "Force deploy a specific immutable image digest to Cloud Run"
inputs:
  - name: "SERVICE_NAME"
    type: "string"
    required: true
  - name: "IMAGE_DIGEST"
    type: "string"
    required: true
    description: "Full image path with @sha256:..."
  - name: "REGION"
    type: "string"
    default: "us-central1"
outputs:
  - name: "revision_id"
    type: "string"
steps:
  - "Run 'gcloud run deploy $SERVICE_NAME --image=$IMAGE_DIGEST --region=$REGION ...'"
success_criteria:
  - "Service converges to 100% traffic on new revision"
safety_notes:
  - "Modifies production state"
  - "Ensure digest is verified in staging first"
