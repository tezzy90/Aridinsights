id: "unique_prompt_id" # format: intent.component.action (e.g., verify.cloud_build.build_status)
version: "1.0.0"
owner: "platform-engineering"
category: "verify" # Options: build, deploy, verify, debug, strategy, agents
intent: "Verify that the recent Cloud Build run succeeded"
inputs:
  - name: "build_id"
    type: "string"
    description: "The unique ID of the Cloud Build run"
    required: true
  - name: "region"
    type: "string"
    description: "GCP Region (default: us-central1)"
    default: "us-central1"
outputs:
  - name: "status"
    type: "enum"
    options: ["SUCCESS", "FAILURE", "WORKING"]
  - name: "logs_url"
    type: "string"
preconditions:
  - "User is authenticated with gcloud"
  - "Project ID is set"
steps:
  - "Run 'gcloud builds describe $build_id ...'"
  - "Check status field"
  - "If FAILURE, retrieve failure_detail"
success_criteria:
  - "Command returns a valid status string"
failure_modes:
  - "Build ID not found"
  - "Permission denied"
safety_notes:
  - "read-only operation"
examples:
  - input: |
      BUILD_ID="123-abc"
      VERIFY_BUILD $BUILD_ID
    output: |
      Status: SUCCESS
